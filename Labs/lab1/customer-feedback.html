<!DOCTYPE html>
<meta charset="UTF-8">
<head>
  <title>Customer Feedback Survey</title>
</head>
<body>
    <h1>Customer Feedback Survey</h1>
    <h2><em>Your opinion matters to us! please share your experience with us</em></h2>
    <fieldset>
        <legend>Customer Feedback Form</legend>
        <label for="full_name">Full Name *</label><div>
        <input id ="full_name" type="text" name="full_name" placeholder="Enter your full name" required>
        <div>
        <label for="email">Email Address *</label><div>
        <input id="email" type="email" name="email" placeholder="Enter your email address" required>
            </div>
        <label for="customer_id">Customer ID</label><div>
        <input id="customer_id" type="text" name="customer_id" placeholder="Enter your customer ID">
        </div>
        </fieldset>
    <fieldset>
            <legend>Service Evaluation</legend>
        <label for="Overrall">Overrall Service Rating(1-5)*</label><div>
            <input type="radio" id="1" name="rating" value="1" required>
            <label for="1">1-Poor</label>
            </div>
            <div>
            <input type="radio" id="2" name="rating" value="2">
            <label for="2">2-Fair</label>
            </div>
            <div>
            <input type="radio" id="3" name="rating" value="3">
            <label for="3">3-Good</label>
            </div>
            <div>
            <input type="radio" id="4" name="rating" value="4">
            <label for="4">4-Very Good</label>
            </div>
            <div>
            <input type="radio" id="5" name="rating" value="5">
            <label for="5">5-Excellent</label>
            </div>
        </div>
        <label for="ServiceCa">Service Category*</label><div>
            <select id="ServiceCa" name="ServiceCa" required>
                <option value="">Select a service category</option>
                <option value="Product Quality">Product Quality</option>
                <option value="Customer Support">Customer Support</option>
                <option value="Delivery Service">Delivery Service</option>
                <option value="Website Experience">Website Experience</option>
            </select>
        </div>
        <label for="Recommand">Would you recommend our services*</label><div>
            <input type="radio" id="yes" name="recommend" value="yes" required>
            <label for="yes">Yes,definitly</label>
            </div>
            <div>
            <input type="radio" id="Maybe" name="recommend" value="maybe">
            <label for="Maybe">Maybe</label>
            </div>
            <div>
            <input type="radio" id="no" name="recommend" value="no">
            <label for="no">No,I would not</label>
            </div>
    </fieldset>
    <fieldset>
        <legend>Experience Details</legend>
        <label for="visit">Visit Date</label><div>
            <input type="date" id="visit" name="visit" required>
        </div>
        <label for="hearaboutus">How did you hear about us?</label>
                <div>
                <input type="checkbox" id="socialmedia" name="hearaboutus" value="socialmedia">
                <label for="socialmedia">Social Media</label>
            </div>
            <div>
                <input type="checkbox" id="friend" name="hearaboutus" value="friend">
                <label for="friend">Friend/Family Recommendation</label>
            </div>
            <div>
                <input type="checkbox" id="advertisement" name="hearaboutus" value="advertisement">
                <label for="advertisement">Advertisement</label>
            </div>
            <div>
                <input type="checkbox" id="SearchEngine" name="hearaboutus" value="SearchEngine">
                <label for="SearchEngine">Search Engine</label>
            </div>
            <div>
                <input type="checkbox" id="other" name="hearaboutus" value="other">
                <label for="other">Other</label>
            </div>
        </div>
        <label for="comments">Additional Comments*</label><div>
        <textarea id="comments" name="comments" rows="4" cols="50" placeholder="Please share your detailed feedback here" required></textarea>
    </fieldset>
    <fieldset>
        <legend>Contact Preferences</legend>
        <label for="contactmet" name="contactmet">Preferred Contact Method</label>
        <div>
        <input type="radio" id="contact" name="contact" value="email">
        <label for="contact">Email</label>
        </div>
        <div>  
        <input type="radio" id="phone" name="contact" value="phone">
        <label for="phone">Phone</label>
        </div>
        <div>
        <input type="radio" id="sms" name="contact" value="sms">
        <label for="sms">SMS</label>
        </div>
        <div>
        <input type="radio" id="postmail" name="contact" value="postmail">
        <label for="postmail">Post Mail</label>
        </div>
        <div>
        <input type="radio" id="donotconme" name="contact" value="donotconme">
        <label for="donotconme">Do not contact me</label>
        </div>
        <label for="contacttime">Best Time to Contact</label>
        <div>
        <select id="contacttime" name="contacttime">
            <option value="">Select a time</option>
            <option value="morning">Morning (8 AM - 12 PM)</option>
            <option value="afternoon">Afternoon (12 PM - 4 PM)</option>
            <option value="evening">Evening (4 PM - 8 PM)</option>
        </div>
    </select>
    </fieldset>
 <div>
    <input type="checkbox" value="confirm" name="confirm" required>
    <label for="confirm">I confirm that all information provided is accurate *</label>
 </div>
    <button type="submit">Submit Feedback</button>
    <button type="reset">Reset Form</button>
  </body>
